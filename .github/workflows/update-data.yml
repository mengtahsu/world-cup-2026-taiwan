name: Update World Cup data
on:
  schedule:
    # GitHub scheduled runs can be delayed. Wake hourly; the script itself
    # throttles scheduled refreshes to roughly once every three hours.
    - cron: "17 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run update
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - name: Commit changed data
        run: |
          git config user.name "world-cup-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/site-data.json
          git diff --cached --quiet || git commit -m "data: refresh fixtures, news and odds"
          git push
